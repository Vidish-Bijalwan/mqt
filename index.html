          </p>

        <section id="destinations">
          <h2>Featured Himalayan &amp; India Destinations</h2>
          <p>Discover our most popular luxury travel destinations across India's mountains, temples, and valleys.</p>

          <article>
            <h3>Kedarnath Yatra Package</h3>
            <p>Embark on a sacred pilgrimage to the ancient Shiva temple of Kedarnath, nestled among snow-capped Himalayan peaks at 11,755 ft. Our Kedarnath yatra packages include comfortable accommodation, experienced guides, and all logistics for a seamless spiritual journey. Starting from ₹18,999.</p>
          </article>

          <article>
            <h3>Valley of Flowers Trek</h3>
            <p>Trek through the UNESCO World Heritage Valley of Flowers, where Himalayan wildflowers paint the alpine meadows in breathtaking colours. Our guided Valley of Flowers packages offer expert botanist guides and premium camping. Starting from ₹14,999.</p>
          </article>

          <article>
            <h3>Ladakh Tour Package</h3>
            <p>Experience the majestic Ladakh — turquoise Pangong Lake, ancient Buddhist monasteries, and the world's highest motorable roads. Our luxury Ladakh tour packages include comfortable stays, 4x4 transfers, and curated cultural experiences. Starting from ₹22,999.</p>
          </article>

          <article>
            <h3>Varanasi Spiritual Tour</h3>
            <p>Witness the timeless ghats of Varanasi along the sacred Ganges River — India's oldest living city. Our Varanasi spiritual tours include private Ganga Aarti experiences, old city walks, and guided temple visits. Starting from ₹12,499.</p>
          </article>
        </section>

          <h2>Curated Luxury Travel Experiences in India</h2>
          <p>Beyond destinations, MyQuickTrippers curates immersive experiences that bring the soul of India to life.</p>

            <li><strong>Sacred Pilgrimage Circuits</strong> — Char Dham Yatra, Varanasi ritual experiences, and temple journeys guided by expert local priests.</li>
            <li><strong>Luxury Wildlife Safaris</strong> — Jim Corbett, Ranthambore, and Kaziranga tiger safaris with premium lodge stays.</li>
            <li><strong>International Luxury Tours</strong> — Curated journeys to Santorini, Dubai, Maldives, and Peru for Indian travellers.</li>
          </ul>
        </section>
